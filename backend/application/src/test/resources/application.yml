spring:
  application:
    name: meyers-ai
  main:
    banner-mode: off
  datasource:
    url: jdbc:tc:postgresql:16.3-alpine:///meyersai
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://keycloak.nicholasmeyers.be/realms/meyers-prive
  ai:
    mcp:
      client:
        enabled: false


management:
  endpoint:
    health:
     probes:
       enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  server:
    port: 8888